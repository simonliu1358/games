<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }

  /* 星星背景粒子 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 20px 30px, #eee, transparent),
      radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,.8), transparent),
      radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
      radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,.6), transparent),
      radial-gradient(2px 2px at 130px 80px, #fff, transparent),
      radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 300px 200px, #fff, transparent),
      radial-gradient(1px 1px at 400px 100px, #ccc, transparent),
      radial-gradient(1px 1px at 500px 300px, #fff, transparent),
      radial-gradient(1px 1px at 600px 150px, #ddd, transparent),
      radial-gradient(1px 1px at 700px 400px, #fff, transparent),
      radial-gradient(1px 1px at 800px 250px, #eee, transparent);
    background-size: 200px 200px;
    background-repeat: repeat;
    animation: twinkle 4s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes twinkle {
    0% { opacity: .4; }
    100% { opacity: .9; }
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 6px;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(100,200,255,.3);
  }
  .title span { color: #6ee7b7; }

  .scoreboard {
    display: flex;
    gap: 20px;
    font-size: 15px;
    color: rgba(255,255,255,.7);
  }
  .scoreboard .num {
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    min-width: 28px;
    display: inline-block;
    text-align: center;
  }
  .scoreboard .high { color: #fcd34d; }

  .canvas-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: inset 0 0 40px rgba(0,0,0,.4), 0 0 30px rgba(100,200,255,.08);
    background: #111827;
    line-height: 0;
  }

  canvas {
    display: block;
    width: 500px;
    height: 500px;
    background: #111827;
    touch-action: none;
  }

  /* 覆盖层 - 开始 / 结束 */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,.65);
    backdrop-filter: blur(4px);
    transition: opacity .35s ease;
    z-index: 10;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .overlay h2 {
    font-size: 36px;
    color: #fff;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(100,200,255,.3);
  }
  .overlay p {
    color: rgba(255,255,255,.6);
    font-size: 15px;
    margin-bottom: 22px;
  }
  .overlay .final-score {
    font-size: 48px;
    font-weight: 800;
    color: #6ee7b7;
    margin-bottom: 4px;
  }
  .overlay .final-label {
    font-size: 14px;
    color: rgba(255,255,255,.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .btn {
    padding: 12px 40px;
    border: none;
    border-radius: 50px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all .25s ease;
    letter-spacing: .5px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6ee7b7, #3b82f6);
    color: #fff;
    box-shadow: 0 4px 20px rgba(110,231,183,.3);
  }
  .btn-primary:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 30px rgba(110,231,183,.4);
  }
  .btn-primary:active { transform: scale(.96); }

  .btn-icon {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.6);
    width: 40px; height: 40px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s ease;
  }
  .btn-icon:hover {
    background: rgba(255,255,255,.1);
    color: #fff;
  }

  .controls-hint {
    display: flex;
    gap: 6px;
    color: rgba(255,255,255,.25);
    font-size: 13px;
    align-items: center;
  }
  .controls-hint kbd {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 6px;
    padding: 2px 9px;
    font-size: 12px;
    color: rgba(255,255,255,.4);
    font-family: inherit;
  }

  /* 移动端方向键 */
  .dpad {
    display: none;
    grid-template-areas: 
      ". up ."
      "left down right";
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(2, 64px);
    gap: 6px;
    margin-top: 4px;
  }
  .dpad-btn {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    color: rgba(255,255,255,.5);
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    transition: background .15s;
  }
  .dpad-btn:active { background: rgba(255,255,255,.14); }
  .dpad-up    { grid-area: up; }
  .dpad-down  { grid-area: down; }
  .dpad-left  { grid-area: left; }
  .dpad-right { grid-area: right; }

  @media (max-width: 560px) {
    .game-wrapper { padding: 16px; gap: 12px; border-radius: 20px; }
    canvas { width: 100%; height: auto; aspect-ratio: 1/1; }
    .title { font-size: 17px; }
    .scoreboard { font-size: 13px; gap: 12px; }
    .scoreboard .num { font-size: 15px; }
    .dpad { display: grid; }
    .overlay h2 { font-size: 26px; }
    .overlay .final-score { font-size: 36px; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="title">🐍 <span>贪吃蛇</span></div>
    <div class="scoreboard">
      <span>🍎 <span class="num" id="score">0</span></span>
      <span>🏆 <span class="num high" id="highScore">0</span></span>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <!-- 开始界面 -->
    <div class="overlay" id="startOverlay">
      <h2>🐍 贪吃蛇</h2>
      <p>吃食物，长身体，别撞墙也别咬自己</p>
      <button class="btn btn-primary" id="startBtn">开始游戏</button>
    </div>

    <!-- 结束界面 -->
    <div class="overlay hidden" id="gameOverOverlay">
      <h2>💀 游戏结束</h2>
      <div class="final-score" id="finalScore">0</div>
      <div class="final-label">得分</div>
      <p id="newHighMsg" style="display:none;color:#fcd34d;font-weight:600;margin-bottom:8px;">🎉 新纪录！</p>
      <button class="btn btn-primary" id="restartBtn">再来一局</button>
    </div>
  </div>

  <div class="controls-hint">
    <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>
    <span style="margin:0 4px;">或</span>
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
    <span style="margin-left:6px;">控制方向</span>
    <span style="margin-left:12px;opacity:.5;">·</span>
    <span style="margin-left:12px;"><kbd>Space</kbd> 暂停</span>
  </div>

  <!-- 触屏方向键 -->
  <div class="dpad">
    <button class="dpad-btn dpad-up"    data-dir="up">    ▲</button>
    <button class="dpad-btn dpad-left"  data-dir="left">  ◀</button>
    <button class="dpad-btn dpad-down"  data-dir="down">  ▼</button>
    <button class="dpad-btn dpad-right" data-dir="right"> ▶</button>
  </div>
</div>

<script>
// ===================== 游戏核心 =====================
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const W = 500, CELL = 20;
const COLS = W / CELL, ROWS = W / CELL;

// DOM 元素
const scoreEl      = document.getElementById('score');
const highScoreEl  = document.getElementById('highScore');
const startOverlay = document.getElementById('startOverlay');
const overOverlay  = document.getElementById('gameOverOverlay');
const finalScoreEl = document.getElementById('finalScore');
const newHighMsg   = document.getElementById('newHighMsg');
const startBtn     = document.getElementById('startBtn');
const restartBtn   = document.getElementById('restartBtn');

// ===================== 音效（Web Audio） =====================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, type = 'square', vol = .12) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(_) {}
}
function sfxEat() { playTone(587, .1, 'square', .10); setTimeout(() => playTone(784, .1, 'square', .08), 60); }
function sfxDie() { playTone(200, .3, 'sawtooth', .12); setTimeout(() => playTone(120, .4, 'sawtooth', .10), 150); }
function sfxMove() { playTone(440, .04, 'sine', .04); }

// ===================== 游戏状态 =====================
let snake, food, direction, nextDirection, score, highScore;
let running = false, paused = false;
let gameLoopId = null;
let speed = 130; // 毫秒/帧

// 读取最高分
highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
highScoreEl.textContent = highScore;

function initGame() {
  snake = [
    { x: 5, y: 7 },
    { x: 4, y: 7 },
    { x: 3, y: 7 },
  ];
  direction = 'right';
  nextDirection = 'right';
  score = 0;
  scoreEl.textContent = '0';
  spawnFood();
  paused = false;
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// ===================== 游戏循环 =====================
function gameTick() {
  if (!running || paused) return;
  direction = nextDirection;
  const head = { ...snake[0] };
  
  switch (direction) {
    case 'up':    head.y--; break;
    case 'down':  head.y++; break;
    case 'left':  head.x--; break;
    case 'right': head.x++; break;
  }

  // 撞墙？
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver(); return;
  }
  // 撞自己？
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    sfxEat();
    spawnFood();
    // 每得5分加速一次，但最快到60ms
    speed = Math.max(60, 130 - Math.floor(score / 3) * 5);
    clearInterval(gameLoopId);
    gameLoopId = setInterval(gameTick, speed);
  } else {
    snake.pop();
  }

  draw();
}

function startGame() {
  if (gameLoopId) { clearInterval(gameLoopId); gameLoopId = null; }
  initGame();
  speed = 130;
  running = true;
  startOverlay.classList.add('hidden');
  overOverlay.classList.add('hidden');
  draw();
  gameLoopId = setInterval(gameTick, speed);
}

function gameOver() {
  running = false;
  if (gameLoopId) { clearInterval(gameLoopId); gameLoopId = null; }
  sfxDie();

  let isNewHigh = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    highScoreEl.textContent = highScore;
    newHighMsg.style.display = 'block';
    isNewHigh = true;
  } else {
    newHighMsg.style.display = 'none';
  }

  finalScoreEl.textContent = score;
  overOverlay.classList.remove('hidden');
}

// ===================== 绘制 =====================
function draw() {
  ctx.clearRect(0, 0, W, W);

  // 网格（极淡）
  ctx.strokeStyle = 'rgba(255,255,255,.02)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,W); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(W,i*CELL); ctx.stroke();
  }

  // 食物
  const fx = food.x * CELL + CELL/2, fy = food.y * CELL + CELL/2;
  ctx.save();
  ctx.shadowColor = '#6ee7b7';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.arc(fx, fy, CELL/2 - 2, 0, Math.PI*2);
  ctx.fillStyle = '#ef4444';
  ctx.fill();
  // 高光
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(fx-3, fy-3, 4, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.fill();
  ctx.restore();

  // 蛇
  snake.forEach((seg, i) => {
    const x = seg.x * CELL, y = seg.y * CELL;
    const pad = 1, r = 4;
    const t = i / snake.length; // 0 = 头
    
    // 蛇身渐变色
    const rColor = Math.round(30 + t * 60);
    const gColor = Math.round(200 - t * 60);
    const bColor = Math.round(130 - t * 50);
    
    ctx.save();
    ctx.shadowColor = `rgba(110,231,183,${.2 - t*.15})`;
    ctx.shadowBlur = i === 0 ? 18 : 8;

    if (i === 0) {
      // 蛇头 - 圆角矩形
      ctx.fillStyle = '#6ee7b7';
      roundRect(x+pad, y+pad, CELL-pad*2, CELL-pad*2, r+2);
      ctx.fill();

      // 眼睛
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      let ex1, ey1, ex2, ey2;
      const eyeOff = 5, eyeR = 3;
      switch (direction) {
        case 'right': ex1 = x+13; ey1 = y+5;  ex2 = x+13; ey2 = y+13; break;
        case 'left':  ex1 = x+5;  ey1 = y+5;  ex2 = x+5;  ey2 = y+13; break;
        case 'up':    ex1 = x+5;  ey1 = y+5;  ex2 = x+13; ey2 = y+5;  break;
        case 'down':  ex1 = x+5;  ey1 = y+13; ex2 = x+13; ey2 = y+13; break;
        default:      ex1 = x+13; ey1 = y+5;  ex2 = x+13; ey2 = y+13;
      }
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI*2); ctx.fill();
      // 瞳孔
      ctx.fillStyle = '#111827';
      ctx.beginPath(); ctx.arc(ex1, ey1, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, 1.5, 0, Math.PI*2); ctx.fill();
    } else {
      // 蛇身 - 圆角矩形
      ctx.fillStyle = `rgb(${rColor},${gColor},${bColor})`;
      roundRect(x+pad, y+pad, CELL-pad*2, CELL-pad*2, r);
      ctx.fill();
    }
    ctx.restore();
  });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ===================== 输入控制 =====================
function setDirection(dir) {
  const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
  if (dir !== opposites[direction]) {
    nextDirection = dir;
  }
}

document.addEventListener('keydown', e => {
  if (!running && e.code !== 'Space') return;

  const keyMap = {
    'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
    'w': 'up', 'W': 'up', 's': 'down', 'S': 'down',
    'a': 'left', 'A': 'left', 'd': 'right', 'D': 'right',
  };

  if (e.code === 'Space') {
    e.preventDefault();
    if (!running) return;
    paused = !paused;
    if (!paused) draw();
    return;
  }

  const dir = keyMap[e.key];
  if (dir) {
    e.preventDefault();
    setDirection(dir);
  }
});

// 触屏方向键
document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!running) return;
    setDirection(btn.dataset.dir);
  });
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!running) return;
    setDirection(btn.dataset.dir);
  });
});

// ===================== 滑动控制（触屏） =====================
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: true });

canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

canvas.addEventListener('touchend', e => {
  if (!running) return;
  if (!touchStartX || !touchStartY) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);

  if (Math.max(absDx, absDy) < 20) return; // 太短忽略

  if (absDx > absDy) {
    setDirection(dx > 0 ? 'right' : 'left');
  } else {
    setDirection(dy > 0 ? 'down' : 'up');
  }

  touchStartX = 0; touchStartY = 0;
}, { passive: true });

// ===================== 暂停指示 =====================
// 在暂停时显示文字
const origTick = gameTick;

// 用绘制覆盖来显示暂停状态
const origDraw = draw;
draw = function() {
  origDraw.call(this);
  if (paused && running) {
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(0, 0, W, W);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px "Segoe UI","PingFang SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,.5)';
    ctx.shadowBlur = 10;
    ctx.fillText('⏸ 暂停中', W/2, W/2);
    ctx.shadowBlur = 0;
  }
};

// ===================== 启动 =====================
startBtn.addEventListener('click', () => { initAudio(); startGame(); });
restartBtn.addEventListener('click', () => { initAudio(); startGame(); });

// 初始绘制
initGame();
draw();
</script>
</body>
</html>
