name: Publish Package
on:
  push:
    tags: ["v*"] # 推送v1.0.0这类标签触发发布
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 赋予上传包权限
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 内置自动Token，无需手动创建PAT
